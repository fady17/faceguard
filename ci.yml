name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test suite
    # macOS runner — afplay and macOS-specific imports are present
    # face_recognition/dlib compilation works on macOS runners without extra setup
    runs-on: macos-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install cmake (required by dlib)
        run: brew install cmake

      - name: Create venv and install runtime dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt
          uv pip install git+https://github.com/ageitgey/face_recognition_models

      - name: Install dev dependencies
        run: uv pip install -r requirements-dev.txt

      - name: Run test suite
        run: .venv/bin/python -m pytest tests/ -v --tb=short

      - name: Verify Makefile help runs
        run: make help

      - name: Verify setup.py runs (no config write — just check it parses)
        run: .venv/bin/python -c "import setup; print('setup.py imports cleanly')"
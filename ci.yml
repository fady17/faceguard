name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test suite
    # macOS runner — afplay and macOS-specific imports are present
    # face_recognition/dlib compilation works on macOS runners without extra setup
    runs-on: macos-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install cmake (required by dlib)
        run: brew install cmake

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Verify Makefile help runs
        run: make help

      - name: Verify setup.py runs (no config write — just check it parses)
        run: python -c "import setup; print('setup.py imports cleanly')"
